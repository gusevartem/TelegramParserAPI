x-depends_on: &additional_services_healthy
  postgres:
    condition: service_healthy
  minio:
    condition: service_healthy
  jaeger:
    condition: service_started

services:
  # Additional
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  adminer:
    image: adminer:5.4.1
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DEFAULT_SYSTEM=pgsql
    ports:
      - "127.0.0.1:8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000" # API S3
      - "127.0.0.1:9001:9001" # Веб-консоль
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - MINIO_SERVER_URL=${MINIO_SERVER_URL}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - http.host=0.0.0.0
      - transport.host=127.0.0.1
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.14.1
    restart: always
    ports:
      - "127.0.0.1:16686:16686"
    volumes:
      - "./jaeger/jaeger-ui.json:/etc/jaeger/jaeger-ui.json"
      - "./jaeger/config.yml:/etc/jaeger/config.yml"
    command: ["--config", "/etc/jaeger/config.yml"]
    environment:
      - SPANMETRICS_FLUSH_INTERVAL=10s
    depends_on:
      opensearch:
        condition: service_healthy

  # Services

  migrator:
    image: ghcr.io/ycalk/telegramparserapi-migrator:latest
    environment:
      - DEBUG=false

      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      - TRACE_EXPORTER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      <<: *additional_services_healthy

  api:
    image: ghcr.io/ycalk/telegramparserapi-api:latest
    restart: always
    ports:
      - "127.0.0.1:5000:8080"
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}

      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION_NAME=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_PUBLIC_URL=${MINIO_SERVER_URL}

      - SAVE_TELEGRAM_RESPONSES=${SAVE_TELEGRAM_RESPONSES}

      - DEFAULT_API_ID=${DEFAULT_API_ID}
      - DEFAULT_API_HASH=${DEFAULT_API_HASH}
      - DEFAULT_DEVICE_MODEL=${DEFAULT_DEVICE_MODEL}
      - DEFAULT_SYSTEM_VERSION=${DEFAULT_SYSTEM_VERSION}
      - DEFAULT_APP_VERSION=${DEFAULT_APP_VERSION}
      - DEFAULT_LANG_CODE=${DEFAULT_LANG_CODE}
      - DEFAULT_SYSTEM_LANG_CODE=${DEFAULT_SYSTEM_LANG_CODE}

      - TRACE_EXPORTER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      <<: *additional_services_healthy
      migrator:
        condition: service_started

  worker:
    image: ghcr.io/ycalk/telegramparserapi-worker:latest
    restart: always
    environment:
      - DEBUG=false

      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION_NAME=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000

      - SAVE_TELEGRAM_RESPONSES=${SAVE_TELEGRAM_RESPONSES}

      - MESSAGE_MONITORING_TIME_LIMIT_HOURS=${MESSAGE_MONITORING_TIME_LIMIT_HOURS}
      - CHANNEL_MESSAGES_STAT_TIME_LIMIT_HOURS=${CHANNEL_MESSAGES_STAT_TIME_LIMIT_HOURS}

      - DEFAULT_API_ID=${DEFAULT_API_ID}
      - DEFAULT_API_HASH=${DEFAULT_API_HASH}
      - DEFAULT_DEVICE_MODEL=${DEFAULT_DEVICE_MODEL}
      - DEFAULT_SYSTEM_VERSION=${DEFAULT_SYSTEM_VERSION}
      - DEFAULT_APP_VERSION=${DEFAULT_APP_VERSION}
      - DEFAULT_LANG_CODE=${DEFAULT_LANG_CODE}
      - DEFAULT_SYSTEM_LANG_CODE=${DEFAULT_SYSTEM_LANG_CODE}

      - TRACE_EXPORTER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      <<: *additional_services_healthy
      migrator:
        condition: service_started

  scheduler:
    image: ghcr.io/ycalk/telegramparserapi-scheduler:latest
    restart: always
    environment:
      - DEBUG=false

      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      - TRACE_EXPORTER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      <<: *additional_services_healthy
      migrator:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
  opensearch-data:
