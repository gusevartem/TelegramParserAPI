name: Deploy

on:
  push:
    branches:
      - v2/main

jobs:
  copy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.3.1"

      - name: Instal Poetry plugins
        run: |
          poetry self add poetry-multiproject-plugin
          poetry self add poetry-polylith-plugin
          poetry install

      - name: Create api project wheel
        working-directory: projects/api
        run: |
          poetry build-project

      - name: Create migrator project wheel
        working-directory: projects/migrator
        run: |
          poetry build-project

      - name: Create scheduler project wheel
        working-directory: projects/scheduler
        run: |
          poetry build-project

      - name: Create worker project wheel
        working-directory: projects/worker
        run: |
          poetry build-project

      - name: Archive code for deploy
        run: |
          zip -r deploy.zip . -x '*.git*' '*.github/*'

      - name: Create .env file
        run: |
          echo "OPENSEARCH_INITIAL_ADMIN_PASSWORD=${{ secrets.OPENSEARCH_INITIAL_ADMIN_PASSWORD }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "SAVE_TELEGRAM_RESPONSES=${{ vars.SAVE_TELEGRAM_RESPONSES }}" >> .env

          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env

          echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" >> .env
          echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" >> .env
          echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}" >> .env
          echo "MINIO_SERVER_URL=${{ vars.MINIO_SERVER_URL }}" >> .env

          echo "RABBITMQ_LOGIN=${{ secrets.RABBITMQ_LOGIN }}" >> .env
          echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env

          echo "DEFAULT_API_ID=${{ secrets.DEFAULT_API_ID }}" >> .env
          echo "DEFAULT_API_HASH=${{ secrets.DEFAULT_API_HASH }}" >> .env
          echo "DEFAULT_DEVICE_MODEL=${{ vars.DEFAULT_DEVICE_MODEL }}" >> .env
          echo "DEFAULT_SYSTEM_VERSION=${{ vars.DEFAULT_SYSTEM_VERSION }}" >> .env
          echo "DEFAULT_APP_VERSION=${{ vars.DEFAULT_APP_VERSION }}" >> .env
          echo "DEFAULT_LANG_CODE=${{ vars.DEFAULT_LANG_CODE }}" >> .env
          echo "DEFAULT_SYSTEM_LANG_CODE=${{ vars.DEFAULT_SYSTEM_LANG_CODE }}" >> .env

          echo "MESSAGE_MONITORING_TIME_LIMIT_HOURS=${{ vars.MESSAGE_MONITORING_TIME_LIMIT_HOURS }}" >> .env
          echo "CHANNEL_MESSAGES_STAT_TIME_LIMIT_HOURS=${{ vars.CHANNEL_MESSAGES_STAT_TIME_LIMIT_HOURS }}" >> .env

      - name: Transfer files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "deploy.zip,.env"
          target: "/home/${{ secrets.SERVER_USER }}/TelegramParserAPI/"

  build:
    runs-on: ubuntu-latest
    environment: staging
    needs: copy
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/TelegramParserAPI/
            unzip -o deploy.zip
            sudo docker compose build
            sudo docker compose stop
            sudo docker compose down
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f
            rm /home/${{ secrets.SERVER_USER }}/TelegramParserAPI/deploy.zip
