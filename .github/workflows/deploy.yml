name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.3.1"

      - name: Install Poetry plugins and dependencies
        run: |
          poetry self add poetry-multiproject-plugin
          poetry self add poetry-polylith-plugin
          poetry self add poetry-plugin-export
          poetry install

      - name: Run tests with pytest
        run: |
          poetry run pytest

  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.3.1"

      - name: Install Poetry plugins and dependencies
        run: |
          poetry self add poetry-multiproject-plugin
          poetry self add poetry-polylith-plugin
          poetry self add poetry-plugin-export
          poetry install

      - name: Build api wheel
        working-directory: projects/api
        run: |
          poetry install
          poetry build-project
          poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Build migrator wheel
        working-directory: projects/migrator
        run: |
          poetry install
          poetry build-project
          poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Build worker wheel
        working-directory: projects/worker
        run: |
          poetry install
          poetry build-project
          poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Build scheduler wheel
        working-directory: projects/scheduler
        run: |
          poetry install
          poetry build-project
          poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: projects/api
          push: true
          tags: ghcr.io/gusevartem/telegramparserapi-api:latest

      - name: Build and push migrator image
        uses: docker/build-push-action@v5
        with:
          context: projects/migrator
          push: true
          tags: ghcr.io/gusevartem/telegramparserapi-migrator:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: projects/worker
          push: true
          tags: ghcr.io/gusevartem/telegramparserapi-worker:latest

      - name: Build and push scheduler image
        uses: docker/build-push-action@v5
        with:
          context: projects/scheduler
          push: true
          tags: ghcr.io/gusevartem/telegramparserapi-scheduler:latest

  deploy:
    runs-on: ubuntu-latest
    environment: staging
    needs: [build_and_push, test_project]
    steps:
      - name: Trigger Coolify redeploy
        run: |
          curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_PARSER }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
